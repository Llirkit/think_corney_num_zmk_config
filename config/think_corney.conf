#
# Display
#
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

#
# Sleep
#
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

#
# Pointing / TrackPoint
#
# Current ZMK uses the pointing feature flag instead of the old mouse flag.
CONFIG_ZMK_POINTING=y

# Enable this only if you intentionally switch config/west.yml to urob/zmk.
# CONFIG_ZMK_INPUT_MOUSE_PS2_ENABLE_UROB_COMPAT=y

#
# Logging
#
CONFIG_ZMK_USB_LOGGING=n
CONFIG_ZMK_LOGGING_MINIMAL=y
CONFIG_PS2_LOG_LEVEL_DBG=n
CONFIG_SPI_LOG_LEVEL_DBG=n
