manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: infused-kim
      url-base: https://github.com/infused-kim
    - name: petejohanson
      url-base: https://github.com/petejohanson
    - name: urob
      url-base: https://github.com/urob

  projects:
    # Default to upstream ZMK main so the repo tracks the current ZMK/Zephyr line.
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml

    # PS/2 mouse / TrackPoint module
    - name: kb_zmk_ps2_mouse_trackpoint_driver
      remote: infused-kim
      revision: main

    # Auto-layer module required for &num_word when HAS_UROB is enabled
    - name: zmk-auto-layer
      remote: urob
      revision: main

    # Fallback if the PS/2 module breaks against upstream main again:
    # - name: zmk
    #   remote: infused-kim
    #   revision: pr-testing/mouse_ps2_module_base
    #   import: app/west.yml

  self:
    path: config
